<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Mogadishu Travel Guide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
      rel="stylesheet">
  
    <!-- Custom CSS (Flask) -->

    <!-- Favicon (Flask) -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.png') }}">
  
    <!-- Local CSS files (Flask paths) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/meanmenu.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/swiper-bundle.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/magnific-popup.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/animate.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/nice-select.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}">
  </head>
<style>
  /* Layout and spacing for the form */
#questionnaire-form {
  max-width: 1100px;
  margin: 0 auto;
}

.form-row {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.form-row .form-group {
  flex: 1;
}

/* Equal size and sharp-cornered inputs */
input.form-control,
select.form-select {
  height: 45px;
  border-radius: 0; /* No rounded corners */
  border: 1px solid #ccc;
}

/* Align the submit button on its own row, left-aligned */
.form-row.single-button {
  justify-content: flex-start;
}

/* Make the submit button rectangle and aligned */
button[type="submit"] {
  border-radius: 0;
  padding: 10px 20px;
}

/* Optional styling for result box */
.itinerary-output {
  white-space: pre-wrap;
  font-family: 'Courier New', monospace;
  background-color: #f8f9fa;
}

</style>
<body>
  <!-- Header area start -->
<header class="header-area fixed-top transparent-header">
  <div class="container header__container">
    <div class="header__main py-2 d-flex align-items-center justify-content-between">
      
      <!-- Logo -->
      <a class="logo" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='assets/images/talsafar.png') }}" alt="logo">
      </a>

      <!-- Main Menu -->
      <nav class="main-menu d-none d-lg-block">
        <ul class="d-flex gap-4 list-unstyled m-0 align-items-center">
          <li><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>

          <li><a class="nav-link" href="{{ url_for('itinerary') }}">Itinerary Planner</a></li>
          
          <li><a class="nav-link" href="{{ url_for('contact') }}">Contact Us</a></li>
          <li><a class="nav-link" href="{{ url_for('lessons') }}">Somali Lessons</a></li>
        </ul>
      </nav>

      <!-- Mobile Menu Icon -->
      <div class="bars d-block d-lg-none">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Nav -->
  <div class="collapse d-lg-none bg-white" id="mobileNav">
    <ul class="list-unstyled p-3">
      <li><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
 
      <li><a class="nav-link" href="{{ url_for('itinerary') }}">Itinerary Planner</a></li>
      <li><a class="nav-link" href="{{ url_for('contact') }}">Contact Us</a></li>
      <li><a class="nav-link" href="{{ url_for('lessons') }}">Somali Lessons</a></li>
    </ul>
  </div>
</header>
<!-- Header area end -->
<!-- Page banner area start here -->
<section class="banner__inner-page bg-image pt-180 pb-180 bg-image"
    data-background="{{ url_for('static', filename='assets/images/banner/banner-inner-page.jpg') }}">
    
    <div class="shape2 wow slideInLeft" data-wow-delay="00ms" data-wow-duration="1500ms">
        <img src="{{ url_for('static', filename='assets/images/banner/inner-banner-shape2.png') }}" alt="shape">
    </div>
    <div class="shape1 wow slideInLeft" data-wow-delay="200ms" data-wow-duration="1500ms">
        <img src="{{ url_for('static', filename='assets/images/banner/inner-banner-shape1.png') }}" alt="shape">
    </div>
    <div class="shape3 wow slideInRight" data-wow-delay="200ms" data-wow-duration="1500ms">
        <img class="sway__animationX" src="{{ url_for('static', filename='assets/images/banner/inner-banner-shape3.png') }}" alt="shape">
    </div>

    <div class="container">
        <h2 class="wow fadeInUp" data-wow-delay="00ms" data-wow-duration="1500ms">Contact Us</h2>
        <div class="breadcrumb-list wow fadeInUp" data-wow-delay="200ms" data-wow-duration="1500ms">
            <a href="{{ url_for('home') }}">Home</a><span><i class="fa-regular fa-angles-right mx-2"></i>Contact Us</span>
        </div>
    </div>
</section>
<!-- Page banner area end here -->

  <form id="questionnaire-form" class="mt-4">
    <div class="form-row">
      <div class="form-group">
        <label for="personality" class="form-label">Name</label>
        <input type="text" class="form-control" id="personality" placeholder="e.g., Idiris">
      </div>
      <div class="form-group">
        <label for="habits" class="form-label">Email</label>
        <input type="text" class="form-control" id="habits" placeholder="e.g., 5NtJg@example.com">
      </div>
    </div>
  
    <div class="form-row">
      <div class="form-group">
        <label for="days" class="form-label">Phone Number</label>
        <input type="number" class="form-control" id="days" min="1" placeholder="e.g., 123456789">
      </div>
      <div class="form-group">
        <label for="pace" class="form-label">Message</label>
        <input type="text" class="form-control" id="days" min="1" placeholder="e.g., Hello IDIRIS">
      </div>
    </div>
  
    <div class="form-row single-button">
      <button type="submit" class="btn btn-primary">Submit</button>
    </div>
  </form>
  

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Inline JavaScript -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("questionnaire-form");
      const resultDiv = document.getElementById("result");
      const outputDiv = document.getElementById("itinerary-output");
      const restartBtn = document.getElementById("restart-button");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const personality = document.getElementById("personality").value.trim();
        const habits = document.getElementById("habits").value.trim();
        const days = document.getElementById("days").value.trim();
        const pace = document.getElementById("pace").value;

        if (!personality || !habits || !days) {
          alert("Please fill in all the fields.");
          return;
        }

        try {
          const response = await fetch("/generate_itinerary", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ personality, habits, days, pace }),
          });

          const data = await response.json();
          outputDiv.textContent = data.itinerary;
          form.classList.add("d-none");
          resultDiv.classList.remove("d-none");
        } catch (err) {
          outputDiv.textContent = "Something went wrong. Please try again.";
        }
      });

      restartBtn.addEventListener("click", () => {
        form.reset();
        resultDiv.classList.add("d-none");
        form.classList.remove("d-none");
      });
    });
  </script>
</body>
</html>
