<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 85vh;
    }

    .page-title {
      color: #1F4E79;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    #flashcard {
      width: 520px;
      height: 300px;
      perspective: 1000px;
      cursor: pointer;
      margin-bottom: 40px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
    }

    #flashcard.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      color: white;
      box-shadow: 0 8px 30px rgba(31, 78, 121, 0.25);
    }

    .front {
      background-color: #1F4E79;
    }

    .back {
      background-color: #2E74B5;
      transform: rotateY(180deg);
    }

    .controls {
      display: flex;
      gap: 16px;
    }

    .controls button {
      padding: 14px 36px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    #prevBtn, #nextBtn {
      background-color: #e0e8f0;
      color: #1F4E79;
    }

    #flipBtn {
      background-color: #1F4E79;
      color: white;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark" style="background-color: #1F4E79;">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="{{ url_for('lessons') }}">‹ Back to Lessons</a>
    </div>
  </nav>

  <div class="page-wrapper">

    <p class="page-title">{{ title }}</p>

    <div id="flashcard">
      <div class="card-inner">
        <div class="front"></div>
        <div class="back"></div>
      </div>
    </div>

    <div class="controls">
      <button id="prevBtn">Previous</button>
      <button id="flipBtn">Flip</button>
      <button id="nextBtn">Next</button>
    </div>

  </div>

  <script>
    const cards = {{ cards_json|safe }};

    let index = 0;
    const flashcard = document.getElementById('flashcard');

    function renderCard() {
      flashcard.querySelector('.front').textContent = cards[index].question;
      flashcard.querySelector('.back').textContent = cards[index].answer;
      flashcard.classList.remove('flipped');
    }

    flashcard.addEventListener('click', () => flashcard.classList.toggle('flipped'));
    document.getElementById('flipBtn').addEventListener('click', () => flashcard.classList.toggle('flipped'));
    document.getElementById('nextBtn').addEventListener('click', () => { index = (index + 1) % cards.length; renderCard(); });
    document.getElementById('prevBtn').addEventListener('click', () => { index = (index - 1 + cards.length) % cards.length; renderCard(); });

    renderCard();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
