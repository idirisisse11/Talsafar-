<style>
  /* Layout and spacing for the form */
#questionnaire-form {
  max-width: 1100px;
  margin: 0 auto;
}

.form-row {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.form-row .form-group {
  flex: 1;
}

/* Equal size and sharp-cornered inputs */
input.form-control,
select.form-select {
  height: 45px;
  border-radius: 0; /* No rounded corners */
  border: 1px solid #ccc;
}

/* Align the submit button on its own row, left-aligned */
.form-row.single-button {
  justify-content: flex-start;
}

/* Make the submit button rectangle and aligned */
button[type="submit"] {
  border-radius: 0;
  padding: 10px 20px;
}

/* Optional styling for result box */
.itinerary-output {
  white-space: pre-wrap;
  font-family: 'Courier New', monospace;
  background-color: #f8f9fa;
}

</style>

<!-- Page banner area start here -->

        <img src="{{ url_for('static', filename='assets/images/banner/inner-banner-shape2.png') }}" alt="shape">
    </div>
    <div class="shape1 wow slideInLeft" data-wow-delay="200ms" data-wow-duration="1500ms">
        <img src="{{ url_for('static', filename='assets/images/banner/inner-banner-shape1.png') }}" alt="shape">
    </div>
    <div class="shape3 wow slideInRight" data-wow-delay="200ms" data-wow-duration="1500ms">

    <div class="container">
        <h2 class="wow fadeInUp" data-wow-delay="00ms" data-wow-duration="1500ms">Itinerary Planner</h2>

        </div>
    </div>
</section>
<!-- Page banner area end here -->

<form id="questionnaire-form" class="mt-4">
  <div class="form-row">
    <div class="form-group">
      <label for="personality" class="form-label">Your Personality</label>
      <input type="text" class="form-control" id="personality" placeholder="e.g., Adventurous">
    </div>
    <div class="form-group">
      <label for="habits" class="form-label">Holiday Habits</label>
      <input type="text" class="form-control" id="habits" placeholder="e.g., Beaches, Museums">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="days" class="form-label">Days of Stay</label>
      <input type="number" class="form-control" id="days" min="1" placeholder="e.g., 3">
    </div>
    <div class="form-group">
      <label for="pace" class="form-label">Preferred Pace</label>
      <select class="form-select" id="pace">
        <option value="relaxed">Relaxed</option>
        <option value="moderate" selected>Moderate</option>
        <option value="fast-paced">Fast-paced</option>
      </select>
    </div>
  </div>

  <div class="form-row single-button">
    <button type="submit" class="btn btn-primary">Generate Itinerary</button>
  </div>
</form>

<!-- ✅ Result section (initially hidden) -->
<div id="result" class="d-none mt-4">
  <h4>Your Itinerary:</h4>
  <div id="itinerary-output" class="mb-3"></div>
  <button id="restart-button" class="btn btn-secondary">Start Over</button>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Inline JavaScript -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("questionnaire-form");
    const resultDiv = document.getElementById("result");
    const outputDiv = document.getElementById("itinerary-output");
    const restartBtn = document.getElementById("restart-button");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const personality = document.getElementById("personality").value.trim();
      const habits = document.getElementById("habits").value.trim();
      const days = document.getElementById("days").value.trim();
      const pace = document.getElementById("pace").value;

      if (!personality || !habits || !days) {
        alert("Please fill in all the fields.");
        return;
      }

      try {
        const response = await fetch("/generate_itinerary", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ personality, habits, days, pace }),
        });

        const data = await response.json();
        outputDiv.textContent = data.itinerary || "No itinerary found.";
        form.classList.add("d-none");
        resultDiv.classList.remove("d-none");
      } catch (err) {
        outputDiv.textContent = "Something went wrong. Please try again.";
      }
    });

    restartBtn.addEventListener("click", () => {
      form.reset();
      resultDiv.classList.add("d-none");
      form.classList.remove("d-none");
    });
  });
</script>
`
