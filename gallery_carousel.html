<!DOCTYPE html>
<html lang="en">
<head>
  <head>
    <meta charset="UTF-8">
    <title>Mogadishu Travel Guide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  
    <!-- Bootstrap CDN (keep as is) -->
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
      rel="stylesheet">
  
    <!-- Custom CSS (Flask) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  
    <!-- Favicon (Flask) -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.png') }}">
  
    <!-- Local CSS files (Flask paths) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/bootstrap.min.css') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/chatbot.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/meanmenu.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/swiper-bundle.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/magnific-popup.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/animate.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/nice-select.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}">
  </head>
<body>
<!-- Header area start -->
<header class="header-area fixed-top transparent-header">
  <div class="container header__container">
    <div class="header__main py-2 d-flex align-items-center justify-content-between">
      
      <!-- Logo -->
      <a class="logo" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='assets/images/talsafar.png') }}" alt="logo">
      </a>

      <!-- Main Menu -->
      <nav class="main-menu d-none d-lg-block">
        <ul class="d-flex gap-4 list-unstyled m-0 align-items-center">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/#services">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('gallery_carousel') }}">Gallery Carousel</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('itinerary') }}">Itinerary Planner</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('mohammed') }}">Meet Mohammed</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('lessons') }}">Somali Lessons</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('currency') }}">Currency</a></li>
         


        </ul>
      </nav>

      <!-- Mobile Menu Icon -->
      <div class="bars d-block d-lg-none">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Nav -->
  <div class="collapse d-lg-none bg-white" id="mobileNav">
    <ul class="list-unstyled p-3">
      <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="/#services">Services</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('gallery_carousel') }}">Gallery Carousel</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('itinerary') }}">Itinerary Planner</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('mohammed') }}">Meet Mohammed</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('lessons') }}">Somali Lessons</a></li>
    </ul>
  </div>
</header>
<!-- Header area end -->
  <!-- Carousel -->
  <div class="container mt-5 pt-5">
    <h2 class="text-center my-4">Gallery Carousel</h2>
    <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
      <!-- Indicators -->
      <div class="carousel-indicators">
        <button type="button"
                data-bs-target="#carouselExampleIndicators"
                data-bs-slide-to="0"
                class="active"
                aria-current="true"
                aria-label="Slide 1"></button>
        <button type="button"
                data-bs-target="#carouselExampleIndicators"
                data-bs-slide-to="1"
                aria-label="Slide 2"></button>
        <button type="button"
                data-bs-target="#carouselExampleIndicators"
                data-bs-slide-to="2"
                aria-label="Slide 3"></button>
      </div>

      <!-- Slides -->
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="{{ url_for('static', filename='assets/images/1st.jpg') }}"
               class="d-block w-100"
               alt="Hotel Mogadishu">
        </div>
        <div class="carousel-item">
          <img src="{{ url_for('static', filename='assets/images/2nd.jpg') }}"
               class="d-block w-100"
               alt="City View of Mogadishu">
        </div>
        <div class="carousel-item">
          <img src="{{ url_for('static', filename='assets/images/3rd.jpg') }}"
               class="d-block w-100"
               alt="Monks at Mosque">
        </div>
      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
